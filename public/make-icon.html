<!doctype html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,800&display=block" rel="stylesheet">
<style>body{background:#000;display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px}</style>
</head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<a id="dl" download="apple-touch-icon.png">Download PNG</a>
<script>
document.fonts.ready.then(() => {
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0B0A08';
  ctx.fillRect(0,0,512,512);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#F5B915';
  ctx.font = '800 210px "Big Shoulders"';
  ctx.letterSpacing = '-4px';
  ctx.fillText('SUB', 256, 240);
  ctx.fillStyle = '#F2EFE7';
  ctx.font = '800 220px "Big Shoulders"';
  ctx.fillText('2:30', 256, 440);
  document.getElementById('dl').href = c.toDataURL('image/png');
  document.getElementById('dl').textContent = 'Download apple-touch-icon.png';
});
</script>
</body>
</html>
